<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Hack Heist Season 2 — Assemble your crew, crack the code, and pull off the perfect build. A 24-hour hackathon experience." />
    <link rel="icon" type="image/png" href="/mask-logo.png" />

    <!-- Preload hero poster for fast mobile LCP (22 KB JPEG loads before JS) -->
    <link rel="preload" as="image" href="/videos/poster.jpg" media="(max-width: 768px)" />

    <!-- Google Fonts: only the 4 families actually used, loaded non-blocking -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="preload"
      as="style"
      href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700&family=Bruno+Ace&family=Chakra+Petch:wght@400;500;600&family=Oxanium:wght@400;500;600;700&display=swap"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700&family=Bruno+Ace&family=Chakra+Petch:wght@400;500;600&family=Oxanium:wght@400;500;600;700&display=swap"
      rel="stylesheet"
      media="print"
      onload="this.media='all'"
    />
    <!-- Fallback for no-JS -->
    <noscript>
      <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700&family=Bruno+Ace&family=Chakra+Petch:wght@400;500;600&family=Oxanium:wght@400;500;600;700&display=swap" rel="stylesheet" />
    </noscript>

    <title>Hack Heist Season 2</title>

    <!-- Inline critical CSS to prevent white flash -->
    <style>
      html, body { background: #000; color: #fff; margin: 0; }
      #root { background: #000; min-height: 100vh; }
    </style>
  </head>

  <body class="bg-black">
    <div id="root"></div>
  </body>
</html>
